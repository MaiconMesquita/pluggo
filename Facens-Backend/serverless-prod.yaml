service: api-plugGo

provider:
  name: aws
  region: sa-east-1
  runtime: provided.al2
  profile: faculdade

plugins:
  - ./vendor/bref/bref
  - serverless-ignore
  - ./vendor/bref/extra-php-extensions

functions:
  api-backend:
    handler: src/index.php
    description: ""
    timeout: 28
    memorySize: 128
    layers:
      - ${bref:layer.php-81-fpm}
      - ${bref-extra:gd-php-81}
    events:
      - httpApi: "*"

package:
  patterns:
    - "!node_modules/**"
    - "!test/**"
